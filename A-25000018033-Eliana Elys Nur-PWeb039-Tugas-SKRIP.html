<!DOCTYPE html>
<html>
<head>
    <title>Format Warna dan Ukuran Teks</title>
</head>
<body>

    <h2 style="color: blue;">Contoh Pemformatan Warna dan Ukuran Teks</h2>

    <p style="color: red;">
        Ini adalah tulisan berwarna merah.
    </p>

    <p style="color: green; font-size: 25px;">
        Tulisan ini berwarna hijau dengan ukuran lebih besar.
    </p>

    <p style="color: purple; font-size: 18px;">
        Kali ini Elys belajar HTML.
    </p>

    <p>
        <span style="color: orange; font-size: 30px;">
            Website punya Elys
        </span>
        dibuat menggunakan HTML dan CSS.
    </p>

    <p>
        <span style="color: brown;">Teks coklat</span>,
        <span style="color: pink; font-size: 22px;">teks pink besar</span>,
        dan
        <span style="color: teal; font-size: 14px;">teks kecil berwarna teal</span>.
    </p>

</body>
</html>
