<!DOCTYPE html>
<html>
<head>
    <title>Format Pangkat Atas dan Bawah</title>
</head>
<body>

    <h2>Contoh Pangkat Atas</h2>
    <p>
        Rumus luas: m<sup>2</sup>
    </p>

    <p>
        Persamaan: x<sup>2</sup> + y<sup>2</sup>
    </p>

    <h2>Contoh Pangkat Bawah</h2>
    <p>
        Rumus kimia air: H<sub>2</sub>O
    </p>

    <p>
        Rumus karbon dioksida: CO<sub>2</sub>
    </p>

</body>
</html>
